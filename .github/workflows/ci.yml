name: CI

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/web-company is intentionally excluded (Decision DR-02: paused special-case
      # LiNKtrend-website build, not on the active customer-factory path; it also has no
      # eslint devDependency installed, so a lint run would fail for unrelated reasons).
      - name: Lint (cms, web-master)
        run: pnpm exec turbo run lint --filter=@linksites/cms --filter=@linksites/web-master

      # GAP-45 (cookies()/headers()/params() -> async, Next.js 14->16 App Router migration) is
      # now fixed -- `tsc --noEmit` passes for apps/web-master. web-master is re-included below.
      - name: Typecheck (all workspaces)
        run: pnpm run typecheck

      # NOTE (GAP-46, discovered while closing GAP-45): `next build` for apps/web-master still
      # fails during Next's internal route-type-checking step (not caught by plain `tsc
      # --noEmit`, which is why the typecheck step above is genuinely green). The failure is a
      # React 18 vs React 19 `@types/react` mismatch: Next.js 16.2.2's generated LayoutProps/
      # PageProps types expect React 19 ReactNode semantics (which include `bigint`), but
      # apps/web-master still declares and resolves React 18.3.1/@types/react ^18.3.17. Fixing
      # this properly means deciding whether apps/web-master (and apps/web-company) upgrade to
      # React 19 to match Next 16, or Next is pinned/downgraded to a React-18-compatible release
      # -- a real version-alignment decision, not something to force through here. `next build`
      # for apps/web-master is intentionally NOT run in CI until that decision is made and
      # implemented (see audit/09_gap_and_risk_register.yaml, GAP-46).

      # NOTE (Phase 1, GAP-43): `apps/cms`'s Vitest suite (test:int) currently fails to
      # resolve "@/..." path aliases under the installed vite/vite-tsconfig-paths versions
      # (verified locally 2026-07-13 -- all 6 test files fail at import-resolution, before
      # any assertion runs). This looks caused by the same root-package.json pnpm.overrides
      # cascade that was found silently force-upgrading apps/web-master and apps/web-company
      # from their declared Next.js 14.x to the actually-installed 16.2.2 (see GAP-44 and
      # ADR-pending "dependency override cascade" writeup in audit/09_gap_and_risk_register.yaml).
      # Running test:int here would fail on every PR for a pre-existing infra reason unrelated
      # to code correctness, which is not useful signal. It is intentionally deferred to a
      # dedicated Phase 1 work packet rather than included here as fake-passing or silently
      # skipped without explanation.
