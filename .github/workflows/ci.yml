name: CI

on:
  push:
    branches: [main, staging, development]
  pull_request:
    branches: [main, staging, development]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/web-company is intentionally excluded (Decision DR-02: paused special-case
      # LiNKtrend-website build, not on the active customer-factory path; it also has no
      # eslint devDependency installed, so a lint run would fail for unrelated reasons).
      - name: Lint (cms, web-master)
        run: pnpm exec turbo run lint --filter=@linksites/cms --filter=@linksites/web-master

      # GAP-45 (cookies()/headers()/params() -> async, Next.js 14->16 App Router migration) is
      # now fixed -- `tsc --noEmit` passes for apps/web-master. web-master is re-included below.
      - name: Typecheck (all workspaces)
        run: pnpm run typecheck

      # GAP-46 is now fixed: apps/web-master and apps/web-company were upgraded to React 19.1.0
      # to match Next.js 16.2.2's generated route types, resolving the React 18/19 @types/react
      # mismatch. `next build` now succeeds for both apps and is verified below.
      - name: Build (web-master)
        run: pnpm --filter @linksites/web-master run build

      - name: Build (web-company)
        run: pnpm --filter @linksites/web-company run build

      # GAP-43 is now fixed: apps/cms's Vitest suite was failing to resolve "@/..." path
      # aliases because vite-tsconfig-paths discovers every tsconfig in the pnpm workspace and
      # could match the wrong one (e.g. sites_projects/old_linktrend's unrelated tsconfig) for
      # files under tests/**, which apps/cms's own tsconfig.json intentionally excludes from
      # its `include`. Fixed via a dedicated tsconfig.vitest.json + a scoped `projects` option.
      - name: CMS unit/contract tests
        run: pnpm --filter @linksites/cms run test:int
