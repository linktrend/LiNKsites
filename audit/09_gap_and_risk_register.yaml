  - gap_id: GAP-47
    requirement_refs: ["24 §35"]
    capability_id: repo.payload_ecosystem_version_alignment
    current_status: verified-working # RESOLVED 2026-07-13, PR #41
    gap_description: >
      RESOLVED (2026-07-13, PR #41). Discovered while triaging GAP-42:
      apps/cms declared "payload": "3.69.0" exactly, but a root
      pnpm.overrides entry silently bumped only the *resolved* payload/
      @payloadcms/next to 3.81.0, while @payloadcms/db-postgres,
      @payloadcms/richtext-lexical, and @payloadcms/ui remained pinned at
      3.69.0 -- a real, dangerous internal version mismatch within
      Payload's own interdependent package family (distinct from and more
      dangerous than GAP-44's single-package Next.js finding). Fixed by
      declaring all payload/@payloadcms/* packages at a single consistent
      version (3.81.0), which also patches a CRITICAL pre-authentication
      account-takeover advisory in payload < 3.79.1.
    severity: critical
    dependencies: []
    recommended_disposition: adapt
    acceptance_tests: ["All payload/@payloadcms/* packages resolve to the same major.minor.patch version.", "Lint/typecheck/test:int all pass."]
    decision_required: null

  - gap_id: GAP-48
    requirement_refs: ["24 §35", "24 §46"]
    capability_id: repo.dependabot_update_pipeline
    current_status: verified-working # PARTIALLY RESOLVED 2026-07-13, PRs #42
    gap_description: >
      PARTIALLY RESOLVED (2026-07-13, PR #42). The repeated Dependabot
      Updates workflow failures observed in the original audit (js-yaml,
      @babel/core, ws, undici) were investigated: these are NOT CI
      pipeline failures. Dependabot's own updater correctly detected that
      the patched version could not be resolved within then-existing
      dependency constraints and reported "security_update_not_possible"
      -- a correct, expected outcome of Dependabot's own tooling, not a
      broken pipeline. Resolved for js-yaml and @babel/core via narrow,
      same-major-bounded pnpm.overrides (matching the corrected pattern
      from GAP-44/47). ws and undici were already covered by GAP-47's
      overrides. Not yet re-verified live against GitHub's Dependabot
      service (requires the fix to merge and a rescan) -- acceptance test
      below is the closing criterion.
    severity: medium
    dependencies: [GAP-47]
    recommended_disposition: adapt
    acceptance_tests: ["Once PRs #38-#42 merge to development/main and Dependabot rescans, confirm no new 'security_update_not_possible' failures recur for js-yaml, @babel/core, ws, or undici."]
    decision_required: null

