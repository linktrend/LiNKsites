  - gap_id: GAP-06
    requirement_refs: ["18"]
    capability_id: linksites.security.tenant_isolation_negative_tests
    current_status: verified-working # RESOLVED 2026-07-15: 12-vector negative matrix built and passing against a real embedded Postgres engine (pglite). Live-Supabase RLS enforcement under the networked svc role remains tracked separately by GAP-50.
    gap_description: >
      RESOLVED (2026-07-15). The missing negative/cross-tenant-attack test
      suite now exists at packages/program-ledger/tests/tenant-isolation.spec.ts
      (harness: tenantIsolation.harness.ts), closing the manual §18.84-85
      requirement. It applies the REAL migrations that define the tenant
      boundary -- supabase/migrations/20260715_000001_lsites_sites_core.sql
      plus its shared-platform prerequisite (LiNKplatform's
      20260714_000001_platform_foundation.sql, vendored byte-identically under
      tests/fixtures/ so the suite runs in CI without the sibling repo) -- to
      an embedded PostgreSQL 16 engine (@electric-sql/pglite, not a mock), so
      RLS/role/SECURITY-DEFINER semantics are genuinely exercised. It covers 12
      distinct cross-tenant vectors, each asserting BOTH a denied (negative)
      case AND a paired same-org (positive) case so it proves isolation rather
      than blanket failure: (V1) direct cross-org sites read by id, (V2)
      child-row read via join-based RLS, (V3) mismatched vs forged app.site_id,
      (V4) revoked member, (V5) null-org visibility, (V6) cross-boundary
      INSERT/UPDATE/DELETE, (V7) role-hierarchy escalation via
      platform.has_org_access, (V8) crafted join/subquery leakage, (V9)
      principal with no membership, (V10) bare authenticated role, (V11)
      svc_observer with SELECT-grant-but-no-policy, (V12) unauthenticated
      public-render path.
      FINDINGS the matrix surfaced (documented in the spec's docblock -- these
      are properties of the RLS design, not test failures): F1 -- the
      app.site_id fast-path is an UNCONDITIONAL grant keyed only on a session
      GUC, so cross-tenant isolation depends on app.site_id being server-set
      from the resolved hostname and NEVER client-influenced; RLS gives no
      defense-in-depth against a forged app.site_id. F2 -- a sites row with
      org_id IS NULL is visible/writable to every principal (including one with
      no membership), so org_id must be backfilled and made NOT NULL before any
      real customer data is loaded. F3 -- no Supabase authenticated/anon role
      is wired into any lsites_sites policy (only svc_linksites_runtime), so
      there is no direct end-user path to these tables yet and a realistic
      end-user-JWT path could not be tested because it does not exist in this
      schema; the runtime role impersonates the user's identity via auth.uid().
      F4 -- svc_observer holds SELECT grants but no RLS policy targets it, so it
      reads zero rows. NOT covered here: live-Supabase enforcement under the
      real networked svc_linksites_runtime grants (tracked by GAP-50).
    impact: { customer: "Direct risk of one customer's data being exposed to another once real content exists -- the membership boundary is now proven to fail closed in automated tests; residual risk is concentrated in findings F1 (app.site_id must be server-controlled) and F2 (null org_id must be eliminated) before real data loads.", security: "critical", reliability: "medium", business: "high (reputational/legal)", implementation: "done for the test-suite scope; F1/F2 are app-layer/schema follow-ups" }
    severity: critical
