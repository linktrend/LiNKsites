  - gap_id: GAP-44
    requirement_refs: ["24 §35"]
    capability_id: repo.dependency_override_cascade
    current_status: broken
    gap_description: >
      The root package.json's pnpm.overrides block contains next@ version
      overrides whose ranges span multiple majors (e.g. "next@>=13.0.0
      <15.0.8": ">=15.0.8", "next@>=9.5.0 <15.5.13": ">=15.5.13"). pnpm
      applies overrides cumulatively, so a package declaring an older
      Next.js major (e.g. apps/web-master's declared 14.2.33) gets silently
      cascaded upward through each subsequent override until it lands on
      the newest one -- confirmed to resolve to 16.2.2 in every app
      (apps/cms, apps/web-master, apps/web-company), regardless of each
      app's own package.json declaration. Confirmed real, not theoretical:
      this already broke apps/web-master's and apps/web-company's `next
      lint` scripts (Next 16 removed the `next lint` subcommand), which was
      fixed as part of the Phase 1 CI work packet (2026-07-13). It has not
      been ruled out that other Next-14-to-16 breaking changes silently
