      vitest.config.mts. Two smaller, related issues were also fixed:
      a DATABASE_URI-required-at-import-time crash (src/utils/bootstrap.ts
      eagerly imports payload.config.ts) and a jsdom/Node
      native-webstorage localStorage conflict. Suite now passes 18/19
      tests (1 correctly skipped), 0 failures, and runs in the CI gate.
