  - gap_id: GAP-43
    requirement_refs: ["24 §38"]
    capability_id: ci.real_build_test_gate
    current_status: verified-working # RESOLVED 2026-07-13, PR #40
    gap_description: >
      RESOLVED (2026-07-13, PR #40). apps/cms's Vitest suite (`test:int`)
      was failing at the module-resolution stage for all 6 test files with
      "Failed to resolve import '@/...'" errors -- before any test
      assertion executed. Root cause: vite-tsconfig-paths, without a
      scoped `projects` option, eagerly discovers every tsconfig.json in
      the pnpm workspace and could match the wrong one (e.g.
      sites_projects/old_linktrend's unrelated tsconfig) for files under
      apps/cms/tests/**, which apps/cms's own tsconfig.json intentionally
      excludes from its `include`. Fixed via a dedicated
      apps/cms/tsconfig.vitest.json + a scoped `projects` option in
      vitest.config.mts. Two smaller, related issues were also fixed:
      a DATABASE_URI-required-at-import-time crash (src/utils/bootstrap.ts
      eagerly imports payload.config.ts) and a jsdom/Node
      native-webstorage localStorage conflict. Suite now passes 18/19
      tests (1 correctly skipped), 0 failures, and runs in the CI gate.
    impact: { customer: "n/a directly", security: "medium (the tenant-isolation-relevant site-scoping.spec.ts contract test cannot currently run at all, compounding GAP-06)", reliability: "medium", business: "low", implementation: "medium" }
    severity: high
    dependencies: [GAP-44]
    recommended_disposition: adapt
    acceptance_tests: ["pnpm --filter @linksites/cms run test:int passes locally and in CI without module-resolution errors."]
    decision_required: null

  - gap_id: GAP-44
    requirement_refs: ["24 §35"]
    capability_id: repo.dependency_override_cascade
    current_status: broken
    gap_description: >
      The root package.json's pnpm.overrides block contains next@ version
      overrides whose ranges span multiple majors (e.g. "next@>=13.0.0
      <15.0.8": ">=15.0.8", "next@>=9.5.0 <15.5.13": ">=15.5.13"). pnpm
      applies overrides cumulatively, so a package declaring an older
      Next.js major (e.g. apps/web-master's declared 14.2.33) gets silently
      cascaded upward through each subsequent override until it lands on
      the newest one -- confirmed to resolve to 16.2.2 in every app
      (apps/cms, apps/web-master, apps/web-company), regardless of each
      app's own package.json declaration. Confirmed real, not theoretical:
      this already broke apps/web-master's and apps/web-company's `next
      lint` scripts (Next 16 removed the `next lint` subcommand), which was
      fixed as part of the Phase 1 CI work packet (2026-07-13). It has not
      been ruled out that other Next-14-to-16 breaking changes silently
      affect apps/web-master or apps/web-company's runtime behavior --
      this has not been comprehensively checked.
    impact: { customer: "unknown -- could affect apps/web-master's actual customer-facing runtime behavior in ways not yet surfaced", security: "medium (unintended, un-reviewed major-version upgrades bypass normal upgrade review)", reliability: "high", business: "medium", implementation: "medium-high -- requires deciding a target Next.js major per app, then rewriting the override ranges to be same-major-scoped" }
    severity: high
    dependencies: []
    recommended_disposition: adapt
    acceptance_tests: ["Each app's package.json declared Next.js version matches its actually-installed version.", "pnpm.overrides ranges are same-major-scoped (or replaced with a per-app override strategy) so future security-floor bumps cannot silently cross a major version boundary again."]
    decision_required: "Which Next.js major should apps/web-master and apps/web-company deliberately target -- stay on the already-running 16.x (smaller migration, but unaudited for breaking-change exposure), or force a genuine downgrade back to 14.x (larger effort, but matches original intent)? Not decided in this session -- recommend Carlos or the implementation team decide once GAP-43 is also resolved, since they may share a root cause."

  - gap_id: GAP-45
    requirement_refs: ["24 §35"]
    capability_id: repo.dependency_override_cascade
    current_status: broken
    gap_description: >
      Confirmed real fallout from GAP-44: apps/web-master's typecheck fails
      with ~13 TS2339 errors because its code calls Next.js App Router's
      cookies()/headers() synchronously (correct for the declared Next.js
      14.2.33), but the app actually runs Next.js 16.2.2 (per GAP-44),
      where these APIs became async (Promise-returning). Affected files
      (verified 2026-07-13 via a real GitHub Actions CI run, PR #38):
      apps/web-master/src/app/[lang]/layout.tsx,
      apps/web-master/src/lib/site-context.ts,
      apps/web-master/src/app/api/ai-actions/contact/route.ts,
      apps/web-master/src/app/llms.txt/route.ts,
      apps/web-master/src/app/robots.ts,
      apps/web-master/src/app/sitemap.ts.
      This is real migration work (thread `await` through every call site
      and any callers up the chain), not a one-line fix -- intentionally
      NOT rushed through inside the CI-gate work packet. apps/web-master's
      typecheck was excluded from the new CI gate (ci.yml) until this is
      resolved.
    impact: { customer: "unknown -- if any of these code paths run in production today, they may throw at runtime, not just fail typecheck (a synchronous .get() call on a Promise object returns undefined instead of throwing in some cases, which could silently produce wrong SEO/robots/sitemap/cookie-reading behavior rather than a visible crash)", security: "low-medium", reliability: "high", business: "medium", implementation: "medium" }
    severity: high
    dependencies: [GAP-44]
    recommended_disposition: adapt
    acceptance_tests: ["apps/web-master's typecheck passes with cookies()/headers() awaited correctly at every call site.", "Manual smoke test confirms robots.txt, sitemap.xml, llms.txt, and the contact API route still behave correctly at runtime after the fix (not just typecheck-clean)."]
    decision_required: null

